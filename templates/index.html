<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css"/>
    
    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
    <!-- proj4 and spilhaus plugin -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.19.10/proj4.js"></script>
    <!-- proj4leaflet -->
    <script src="https://unpkg.com/proj4leaflet@1.0.2/src/proj4leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>

    <!-- map script cod Defer -->
    <!-- <script defer src="script/script-proj.js"></script> -->
    <script defer src="/static/interface.js"></script>

    <title>Spilhaus GeoJSON Transfer</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="map-panel" aria-label="Spilhaus tile preview">
        <div id="mapSpilhaus"></div>
      </section>

      <aside class="submit-panel" aria-labelledby="appTitle">
        <div class="panel-header">
          <p class="eyebrow">Spilhaus Reprojection</p>
          <h1 id="appTitle">Spilhaus GeoJSON Reprojection</h1>
          <p>This project takes a GeoJSON file and transforms it into the Spilhaus projection. It automatically fixes the stray-line issue caused by reprojection. 
            For repair only, please upload a GeoJSON file in urn:ogc:def:crs:ESRI::54099
          </p>
          <a href="https://github.com/yuyingxieuw/SpilhausReprojectionAPP" target="_blank" rel="noopener noreferrer">
            View on GitHub
          </a>
        </div>

        <form id="submitForm" class="submit-form">
          <label class="field">
            <span>Upload GeoJSON</span>
            <input id="geojsonFile" type="file" accept=".geojson,.json,application/geo+json,application/json" />
          </label>

          <label class="field">
            <span>Paste GeoJSON</span>
            <textarea
              id="geojsonInput"
              spellcheck="false"
              placeholder='{"type":"FeatureCollection","features":[]}'
            ></textarea>
          </label>

          <div class="form-actions">
            <button id="submitButton" type="submit">Submit</button>
            <button id="cleanButton" type="button">Clean</button>
          </div>
          <p id="submitStatus" class="status" role="status" aria-live="polite"></p>
        </form>
      </aside>
    </main>

  </body>
</html>
